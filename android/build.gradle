apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

def deepArMavenUrl = safeExtGet('deepArMavenUrl', 'https://sdk.developer.deepar.ai/maven-android-repository/releases')
def deepArMavenUsername = safeExtGet('deepArMavenUsername', null)
def deepArMavenPassword = safeExtGet('deepArMavenPassword', null)
def deepArAarPath = safeExtGet('deepArAarPath', "$projectDir/libs/deepar.aar")

repositories {
    maven {
        url deepArMavenUrl
        metadataSources {
            mavenPom()
            artifact()
        }

        if (deepArMavenUsername != null && deepArMavenPassword != null) {
            credentials {
                username deepArMavenUsername
                password deepArMavenPassword
            }
            authentication {
                basic(org.gradle.authentication.http.BasicAuthentication)
            }
        }
    }

    flatDir {
        dirs "$projectDir/libs"
    }
}

android {
    def agpVersion = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION
    if (agpVersion.tokenize('.')[0].toInteger() >= 7) {
      namespace "com.oney.WebRTCModule"
    }

    compileSdkVersion safeExtGet('compileSdkVersion', 24)
    buildToolsVersion safeExtGet('buildToolsVersion', "23.0.1")

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion safeExtGet('targetSdkVersion', 24)
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "DEEPAR_LICENSE_KEY", "\"${safeExtGet('deepARLicenseKey', 'b40d07522b8976d959e1ac9bc137a77f67a422aa77d6078efc67249e6f1db63976c2442c340d591c')}\""
        consumerProguardFiles 'consumer-rules.pro'
    }

    // WebRTC requires Java 8 features
    // https://groups.google.com/forum/?utm_medium=email&utm_source=footer#!msg/discuss-webrtc/V1h2uQMDCkA/RA-uzncVAAAJ
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation "com.facebook.react:react-android:+"
    api 'org.jitsi:webrtc:124.+'
    implementation "androidx.core:core:1.7.0"
    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
    if (deepArAarPath != null && file(deepArAarPath).exists()) {
       api files(deepArAarPath)
    } else {
        api safeExtGet('deepArDependency', 'ai.deepar.ar:deepar:5.6.0')
    }
}
